image:
  repository: fluent/fluent-bit
  tag: "3.1"
  pullPolicy: Always

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true
  nodeAccess: true

tolerations:
  - operator: Exists

luaScripts:
  flatten.lua: |
    -- This image's Fluent Bit build has no cjson binding, so we can't
    -- generically decode "message" as JSON. Instead, pull just the fields
    -- we know Serilog's JsonFormatter emits, via plain Lua string patterns.
    -- Non-JSON content (e.g. a plain Console.WriteLine line) simply won't
    -- match any pattern below, so the record passes through unchanged.
    function flatten_message(tag, timestamp, record)
        local message = record["message"]
        if type(message) ~= "string" then
            return 0, timestamp, record
        end

        local changed = false

        local level = message:match('"Level":"([^"]*)"')
        if level then
            record["Level"] = level
            changed = true
        end

        local template = message:match('"MessageTemplate":"(.-)",')
        if template then
            record["MessageTemplate"] = template
            changed = true
        end

        local application = message:match('"Application":"([^"]*)"')
        if application then
            record["Application"] = application
            changed = true
        end

        local correlationId = message:match('"CorrelationId":"([^"]*)"')
        if correlationId then
            record["CorrelationId"] = correlationId
            changed = true
        end

        local traceId = message:match('"TraceId":"([^"]*)"')
        if traceId then
            record["TraceId"] = traceId
            changed = true
        end

        local spanOperationName = message:match('"SpanOperationName":"([^"]*)"')
        if spanOperationName then
            record["SpanOperationName"] = spanOperationName
            changed = true
        end

        if not changed then
            return 0, timestamp, record
        end

        return 1, timestamp, record
    end

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  - name: SPLUNK_HEC_TOKEN
    valueFrom:
      secretKeyRef:
        name: splunk-secrets
        key: SPLUNK_HEC_TOKEN

config:
  service: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*_bookstore_*.log
        Parser            cri_bookstore
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['container_name'] fluent-bit

    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['container_name'] ^(authservice|productservice|inventoryservice)$

    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/scripts/flatten.lua
        call    flatten_message

    [FILTER]
        Name    modify
        Match   kube.*
        Add     environment Production
        Add     platform BookStore-AKS

  outputs: |
    [OUTPUT]
        Name                splunk
        Match               kube.*
        Host                prd-p-opur1.splunkcloud.com
        Port                8088
        Splunk_Token        ${SPLUNK_HEC_TOKEN}
        TLS                 On
        TLS.Verify          Off
        Event_Index         main
        Event_Sourcetype    bookstore:json
        Retry_Limit         5

  customParsers: |
    [PARSER]
        Name        cri_bookstore
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z