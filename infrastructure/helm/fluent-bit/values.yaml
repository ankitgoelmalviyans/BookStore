image:
  repository: fluent/fluent-bit
  tag: "3.1"
  pullPolicy: Always

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true
  nodeAccess: true

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

config:
  service: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*_bookstore_*.log
        multiline.parser  cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name    modify
        Match   kube.*
        Add     environment Production
        Add     platform BookStore-AKS

  outputs: |
    [OUTPUT]
        Name                splunk
        Match               kube.*
        Host                prd-p-opur1.splunkcloud.com
        Port                8088
        Splunk_Token        ${SPLUNK_HEC_TOKEN}
        TLS                 On
        TLS.Verify          Off
        Splunk_Send_Raw     On
        Event_Index         main
        Event_Sourcetype    bookstore:json
        Retry_Limit         5
