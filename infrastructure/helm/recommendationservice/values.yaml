namespace: bookstore
environment: Production
replicaCount: 1

service:
  name: recommendationservice
  port: 80

image:
  repository: bookstoreaurega.azurecr.io/recommendationservice
  tag: latest
  pullPolicy: Always

ingress:
  host: ""
  path: /recommendation

istio:
  # Not meshed — a Service Bus consumer plus a read API called only from the UI via ingress, no
  # synchronous in-cluster callers (same posture as notificationservice).
  inject: false

# Bumped from cpu 50m/250m, memory 96Mi/192Mi to cover Microsoft.ML's native runtime memory floor plus
# the periodic in-process matrix-factorization training cycle (RecommendationModelTrainingWorker) —
# this pod still also serves live read traffic, so the bump has headroom for both concerns.
resources:
  requests:
    cpu: 75m
    memory: 160Mi
  limits:
    cpu: 400m
    memory: 320Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
