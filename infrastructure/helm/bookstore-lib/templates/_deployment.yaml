{{- define "bookstore-lib.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace | default "bookstore" }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        {{- if (.Values.istio | default dict).inject }}
        # Opt-in per-pod injection, not namespace-wide — this is what lets Product/Inventory be
        # meshed while AuthService (istio.inject: false) stays out of it. `default dict` guards
        # against a future chart consumer omitting the `istio:` key entirely rather than setting
        # inject: false — without it, that omission is a nil-pointer template render failure, not
        # a safe "not meshed" default. See infrastructure/istio/README.md for the full install
        # sequence.
        sidecar.istio.io/inject: "true"
        # Deliberately tuned well under Istio's own sidecar defaults — see
        # infrastructure/istio/istio-operator-minimal.yaml for why (single tight node).
        sidecar.istio.io/proxyCPU: "50m"
        sidecar.istio.io/proxyMemory: "64Mi"
        sidecar.istio.io/proxyCPULimit: "100m"
        sidecar.istio.io/proxyMemoryLimit: "128Mi"
        {{- end }}
    spec:
      containers:
        - name: {{ .Values.service.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: http://+:80
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | default "Production" }}
          envFrom:
            - secretRef:
                name: {{ .Values.service.name }}-secrets
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.resources.requests.memory | default "128Mi" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.resources.limits.memory | default "256Mi" }}
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
{{- end }}
