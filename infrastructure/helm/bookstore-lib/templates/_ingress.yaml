{{- define "bookstore-lib.ingress" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.service.name }}-ingress
  namespace: {{ .Values.namespace | default "bookstore" }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # All three services share the same nip.io host, so they share one TLS secret
  # (and therefore one Let's Encrypt certificate) rather than each requesting
  # its own near-duplicate cert for the identical hostname.
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: bookstore-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: 80
{{- end }}