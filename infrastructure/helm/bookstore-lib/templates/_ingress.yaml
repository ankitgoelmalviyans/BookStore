{{- define "bookstore-lib.ingress" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.service.name }}-ingress
  namespace: {{ .Values.namespace | default "bookstore" }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # TODO: Re-enable when custom domain with proper DNS is configured
    # nip.io domains have issues with Let's Encrypt HTTP-01 challenge
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # TODO: Re-enable TLS when Let's Encrypt cert is working
  # Requires a proper domain (not nip.io) or manual cert-manager configuration
  # tls:
  #   - hosts:
  #       - {{ .Values.ingress.host }}
  #     secretName: {{ .Values.service.name }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: 80
{{- end }}