namespace: bookstore
environment: Production
replicaCount: 1

service:
  name: authservice
  port: 80

image:
  repository: bookstoreaurega.azurecr.io/authservice
  tag: latest
  pullPolicy: Always

ingress:
  host: ""
  path: /auth

istio:
  # Deliberately NOT meshed — see infrastructure/istio/peer-authentication.yaml for why (kept out
  # of scope for this first pass, not a security decision). Explicit false, not omitted, because
  # the shared deployment template's {{ .Values.istio.inject }} check needs this key to exist.
  inject: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
