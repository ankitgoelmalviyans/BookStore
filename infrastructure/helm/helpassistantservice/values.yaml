namespace: bookstore
environment: Production
replicaCount: 1

service:
  name: helpassistantservice
  port: 80

image:
  repository: bookstoreaurega.azurecr.io/helpassistantservice
  tag: latest
  pullPolicy: Always

ingress:
  host: ""
  path: /help-assistant

istio:
  # Not meshed — anonymous HTTP API called only from the UI via ingress, no synchronous in-cluster
  # callers (same posture as aiservice/notificationservice/recommendationservice).
  inject: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
