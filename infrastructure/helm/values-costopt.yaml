# Profile A — Cost Optimised (NGINX Ingress, no APIM, GitHub Models)
global:
  profile: costopt
  ingressHost: ""          # set by pipeline: $INGRESS_HOST

authservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

productservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

inventoryservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Phase 2 — cd-costopt.yml deploys this whenever the ORDER_SQL_CONNECTION repo secret is set
# (OrderDb is provisioned by infra-bicep.yml — free-tier Azure SQL Serverless, see
# infrastructure/bicep/sql-order-payment.bicep; the secret holds that server's connection string,
# set once by the operator since infra-bicep.yml can't write GitHub secrets itself). Unset secret
# means the Kubernetes secret and the `helm upgrade` step are both skipped — but if orderservice
# was already deployed in an earlier run, an unset secret now makes the workflow fail loudly
# (see the "Guard" step in cd-costopt.yml) rather than silently leaving that release running
# against a secret we chose not to touch.
orderservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Phase 2 — same gating as orderservice, on the PAYMENT_SQL_CONNECTION repo secret (PaymentDb).
paymentservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Phase 2 — no SQL dependency, deploys unconditionally (Service Bus topology already provisioned).
notificationservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Phase 3 — classic ML, no SQL/external-AI dependency, deploys unconditionally. Recommendations:Enabled
# gates the order-events subscriber only; the read API works either way (empty until data flows in).
recommendationservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Phase 3 — RAG. No SQL dependency, deploys unconditionally. Ai:IngestionEnabled gates the
# product-events subscriber; AzureOpenAI:Key (AZURE_OPENAI_KEY secret, a separate Azure OpenAI
# resource in its own account — see cd-costopt.yml) selects the real client over the built-in fake.
aiservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Isolated from aiservice above — a separate microservice, separate Foundry project, separate
# credentials. No SQL dependency, deploys unconditionally. Anonymous endpoint (public help
# widget), so no Jwt:Key. Falls back to a deterministic fake agent client until the one-time
# Foundry setup (infra/setup-foundry-agent.sh + infra/deploy-foundry-agent-publish.sh) has run and
# its app-registration credentials are in the helpassistantservice-secrets K8s secret.
helpassistantservice:
  image:
    tag: ""                # set by pipeline: ${{ github.sha }}
  ingress:
    host: ""               # set by pipeline: $INGRESS_HOST

# Gateway — Profile A uses NGINX Ingress (free, inside AKS)
# No APIM in this profile
gateway:
  useApim: false
  nginxEnabled: true

# LLM — Profile A uses GitHub Models (free tier)
llm:
  useAzureOpenAI: false
  useGitHubModels: true
  githubModelsEndpoint: https://models.inference.ai.azure.com
