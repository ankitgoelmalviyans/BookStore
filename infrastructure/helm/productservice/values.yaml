namespace: bookstore
environment: Production
replicaCount: 1

service:
  name: productservice
  port: 80

image:
  repository: bookstoreaurega.azurecr.io/productservice
  tag: latest
  pullPolicy: Always

ingress:
  host: ""
  path: /product

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
