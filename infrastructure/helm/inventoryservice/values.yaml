namespace: bookstore
environment: Production
replicaCount: 1

service:
  name: inventoryservice
  port: 80

image:
  repository: bookstoreaurega.azurecr.io/inventoryservice
  tag: latest
  pullPolicy: Always

ingress:
  host: ""
  path: /inventory

istio:
  # Meshed — see infrastructure/istio/README.md. Inventory is the target of
  # virtual-service-resilience.yaml's retry/timeout policy.
  inject: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
