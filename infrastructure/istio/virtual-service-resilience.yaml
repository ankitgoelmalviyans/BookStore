# Safe to apply by default — unlike the AuthorizationPolicy reference file, this can't break real
# user traffic. NGINX Ingress has no sidecar, so its calls to inventoryservice bypass Istio's L7
# routing entirely (plain Kubernetes Service DNS/ClusterIP) — this VirtualService only affects
# traffic FROM meshed pods (today: none exist yet; this is groundwork for a future OrderService).
#
# The "Polly without code" example from docs/LLD.md: retries + timeout declared here, not written
# in C#.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: inventoryservice-resilience
  namespace: bookstore
spec:
  hosts:
    - inventoryservice
  http:
    # Idempotent reads: retrying on 5xx is safe here — a failed GET has no side effect to
    # duplicate, so retrying after a server error (not just a connection failure) can't cause harm.
    - match:
        - method:
            exact: GET
      timeout: 3s
      retries:
        attempts: 2
        perTryTimeout: 1s
        retryOn: 5xx,reset,connect-failure,refused-stream
      route:
        - destination:
            host: inventoryservice
            port:
              number: 80
    # Everything else — writes (POST/PUT/DELETE), including the future decrement endpoint. A 5xx
    # means the request DID reach the server; we can't tell whether the write already applied
    # before it failed, so retrying on 5xx here risks Envoy resending an already-successful write
    # (e.g. double-decrementing stock). Only retry conditions where the request is guaranteed to
    # have never reached the server at all — no 5xx in this list, deliberately.
    - timeout: 3s
      retries:
        attempts: 2
        perTryTimeout: 1s
        retryOn: reset,connect-failure,refused-stream
      route:
        - destination:
            host: inventoryservice
            port:
              number: 80
---
# Connection pool limits are meaningful even at 1 replica (they cap concurrent requests before
# Envoy starts rejecting locally, which prevents overload). Outlier detection genuinely is NOT —
# it ejects unhealthy endpoints from a load-balancing pool, and there's only one endpoint to eject
# with a single replica. Config is here as the correct starting point for when inventoryservice is
# scaled beyond 1 replica; don't expect to observe ejection behavior before then.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: inventoryservice-destination
  namespace: bookstore
spec:
  host: inventoryservice
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
