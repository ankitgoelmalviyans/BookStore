name: CI — Build and Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'

# None of these jobs push to git or otherwise need repo write access — they only build/test/validate
# (dotnet build/test, npm build, helm/bicep validation). Pinning to read-only here means a compromised
# step can't abuse an org/repo default that grants broader GITHUB_TOKEN permissions — same reasoning
# and same block already used in cd-costopt.yml.
permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build and test AuthService
  # ─────────────────────────────────────────
  build-auth:
    name: Build AuthService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            AuthService/AuthService.sln

      - name: Build
        run: |
          dotnet build \
            AuthService/AuthService.sln \
            --no-restore \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: AuthService/src/AuthService
          file: AuthService/src/AuthService/Dockerfile
          push: false
          tags: authservice:ci

  # ─────────────────────────────────────────
  # JOB 2 — Build and test ProductService
  # ─────────────────────────────────────────
  build-product:
    name: Build ProductService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.ProductSCA/BookStore.ProductService/BookStore.ProductService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.ProductSCA/BookStore.ProductService/BookStore.ProductService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.ProductSCA/BookStore.ProductService/tests/ProductService.UnitTests/ProductService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.ProductService/src
          file: BookStore.ProductSCA/BookStore.ProductService/src/BookStore.ProductService.API/Dockerfile
          push: false
          tags: productservice:ci

  # ─────────────────────────────────────────
  # JOB 3 — Build and test InventoryService
  # ─────────────────────────────────────────
  build-inventory:
    name: Build InventoryService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.ProductSCA/BookStore.InventoryService/BookStore.InventoryService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.ProductSCA/BookStore.InventoryService/BookStore.InventoryService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.ProductSCA/BookStore.InventoryService/tests/InventoryService.UnitTests/InventoryService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.InventoryService
          file: BookStore.ProductSCA/BookStore.InventoryService/InventoryService.API/Dockerfile
          push: false
          tags: inventoryservice:ci

  # ─────────────────────────────────────────
  # JOB 3b — Build and test OrderService
  # ─────────────────────────────────────────
  build-order:
    name: Build OrderService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This job only builds/tests — it never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.OrderSCA/BookStore.OrderService/BookStore.OrderService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.OrderSCA/BookStore.OrderService/BookStore.OrderService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.OrderSCA/BookStore.OrderService/tests/OrderService.UnitTests/OrderService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.OrderService/src
          file: BookStore.OrderSCA/BookStore.OrderService/src/BookStore.OrderService.API/Dockerfile
          push: false
          tags: orderservice:ci

  # ─────────────────────────────────────────
  # JOB 3c — Build and test PaymentService
  # ─────────────────────────────────────────
  build-payment:
    name: Build PaymentService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build/test only — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.OrderSCA/BookStore.PaymentService/BookStore.PaymentService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.OrderSCA/BookStore.PaymentService/BookStore.PaymentService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.OrderSCA/BookStore.PaymentService/tests/PaymentService.UnitTests/PaymentService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.PaymentService/src
          file: BookStore.OrderSCA/BookStore.PaymentService/src/BookStore.PaymentService.API/Dockerfile
          push: false
          tags: paymentservice:ci

  # ─────────────────────────────────────────
  # JOB 3d — Build and test NotificationService
  # ─────────────────────────────────────────
  build-notification:
    name: Build NotificationService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build/test only — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.OrderSCA/BookStore.NotificationService/BookStore.NotificationService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.OrderSCA/BookStore.NotificationService/BookStore.NotificationService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.OrderSCA/BookStore.NotificationService/tests/NotificationService.UnitTests/NotificationService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.NotificationService/src
          file: BookStore.OrderSCA/BookStore.NotificationService/src/BookStore.NotificationService.API/Dockerfile
          push: false
          tags: notificationservice:ci

  # ─────────────────────────────────────────
  # JOB 3f — Build and test RecommendationService
  # ─────────────────────────────────────────
  build-recommendation:
    name: Build RecommendationService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build/test only — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.AiSCA/BookStore.RecommendationService/BookStore.RecommendationService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.AiSCA/BookStore.RecommendationService/BookStore.RecommendationService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.AiSCA/BookStore.RecommendationService/tests/RecommendationService.UnitTests/RecommendationService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.AiSCA/BookStore.RecommendationService/src
          file: BookStore.AiSCA/BookStore.RecommendationService/src/BookStore.RecommendationService.API/Dockerfile
          push: false
          tags: recommendationservice:ci

  # ─────────────────────────────────────────
  # JOB 3g — Build and test AiService
  # ─────────────────────────────────────────
  build-ai:
    name: Build AiService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build/test only — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.AiSCA/BookStore.AiService/BookStore.AiService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.AiSCA/BookStore.AiService/BookStore.AiService.sln \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            BookStore.AiSCA/BookStore.AiService/tests/AiService.UnitTests/AiService.UnitTests.csproj \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.AiSCA/BookStore.AiService/src
          file: BookStore.AiSCA/BookStore.AiService/src/BookStore.AiService.API/Dockerfile
          push: false
          tags: aiservice:ci

  # ─────────────────────────────────────────
  # JOB 3e — Validate EF Core migrations (AuthService/OrderService/PaymentService)
  # ─────────────────────────────────────────
  validate-ef-migrations:
    name: Validate EF Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This job only builds/validates — it never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # `has-pending-model-changes` compares the current model against the last migration's
      # snapshot — this is what actually catches "entity changed, no migration scaffolded for it".
      # `migrations script` doesn't check that; it only replays already-scaffolded migrations into
      # SQL, which catches a different failure mode (a broken migration/design-time factory that
      # can't generate SQL at all). Neither needs a real connection, so no SQL secrets required here.
      - name: Check for pending AuthService model changes
        working-directory: AuthService/src/AuthService
        run: |
          dotnet tool restore
          dotnet ef migrations has-pending-model-changes \
            --context AuthDbContext

      - name: Validate AuthService migrations
        working-directory: AuthService/src/AuthService
        run: |
          dotnet tool restore
          dotnet ef migrations script \
            --context AuthDbContext \
            --idempotent \
            --output /dev/null

      - name: Check for pending OrderService model changes
        working-directory: BookStore.OrderSCA/BookStore.OrderService
        run: |
          dotnet tool restore
          dotnet ef migrations has-pending-model-changes \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.OrderService.API/BookStore.OrderService.API.csproj \
            --context OrderDbContext

      - name: Validate OrderService migrations
        working-directory: BookStore.OrderSCA/BookStore.OrderService
        run: |
          dotnet tool restore
          dotnet ef migrations script \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.OrderService.API/BookStore.OrderService.API.csproj \
            --context OrderDbContext \
            --idempotent \
            --output /dev/null

      - name: Check for pending PaymentService model changes
        working-directory: BookStore.OrderSCA/BookStore.PaymentService
        run: |
          dotnet tool restore
          dotnet ef migrations has-pending-model-changes \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.PaymentService.API/BookStore.PaymentService.API.csproj \
            --context PaymentDbContext

      - name: Validate PaymentService migrations
        working-directory: BookStore.OrderSCA/BookStore.PaymentService
        run: |
          dotnet tool restore
          dotnet ef migrations script \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.PaymentService.API/BookStore.PaymentService.API.csproj \
            --context PaymentDbContext \
            --idempotent \
            --output /dev/null

  # ─────────────────────────────────────────
  # JOB 4 — Build Angular UI
  # ─────────────────────────────────────────
  build-ui:
    name: Build Angular UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            BookStore.ProductSCA/product-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd BookStore.ProductSCA/product-ui
          npm ci

      - name: Build production
        run: |
          cd BookStore.ProductSCA/product-ui
          npx ng build --configuration production \
            --base-href /BookStore/

  # ─────────────────────────────────────────
  # JOB 5 — Validate Helm charts
  # ─────────────────────────────────────────
  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Helm dependency update
        run: |
          helm dependency update infrastructure/helm/authservice
          helm dependency update infrastructure/helm/productservice
          helm dependency update infrastructure/helm/inventoryservice
          helm dependency update infrastructure/helm/orderservice
          helm dependency update infrastructure/helm/paymentservice
          helm dependency update infrastructure/helm/notificationservice
          helm dependency update infrastructure/helm/recommendationservice
          helm dependency update infrastructure/helm/aiservice

      - name: Helm lint
        run: |
          helm lint infrastructure/helm/authservice
          helm lint infrastructure/helm/productservice
          helm lint infrastructure/helm/inventoryservice
          helm lint infrastructure/helm/orderservice
          helm lint infrastructure/helm/paymentservice
          helm lint infrastructure/helm/notificationservice
          helm lint infrastructure/helm/recommendationservice
          helm lint infrastructure/helm/aiservice

      - name: Helm dry run — Profile A
        run: |
          helm template authservice infrastructure/helm/authservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template productservice infrastructure/helm/productservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template inventoryservice infrastructure/helm/inventoryservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template orderservice infrastructure/helm/orderservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template paymentservice infrastructure/helm/paymentservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template notificationservice infrastructure/helm/notificationservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template recommendationservice infrastructure/helm/recommendationservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template aiservice infrastructure/helm/aiservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          echo "Helm dry run passed for Profile A"

  # ─────────────────────────────────────────
  # JOB 6 — Validate Bicep
  # ─────────────────────────────────────────
  validate-bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep
        run: az bicep install

      - name: Validate Bicep syntax — main
        run: |
          az bicep build \
            --file infrastructure/bicep/main.bicep
          echo "main.bicep syntax valid"

      - name: Validate Bicep syntax — demo
        run: |
          az bicep build \
            --file infrastructure/bicep/main.demo.bicep
          echo "main.demo.bicep syntax valid"

  # ─────────────────────────────────────────
  # JOB 7 — Security scan
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."

          # Check for connection strings
          if grep -r "AccountKey=" . \
            --include="*.json" \
            --include="*.cs" \
            --include="*.ts" \
            --exclude-dir=".azure-pipelines-reference" \
            --exclude-dir="bin" \
            --exclude-dir="obj" \
            --exclude-dir="node_modules" | grep -v "AccountKey=\"\""; then
            echo "ERROR: Hardcoded AccountKey found"
            exit 1
          fi

          # Check for passwords
          if grep -r "Password=" . \
            --include="*.json" \
            --include="*.cs" \
            --exclude-dir=".azure-pipelines-reference" \
            --exclude-dir="bin" \
            --exclude-dir="obj" \
            --exclude-dir="node_modules" | grep -v "Password=\"\"" \
            | grep -v "#{" ; then
            echo "ERROR: Hardcoded password found"
            exit 1
          fi

          # Check for azurewebsites.net URLs in Angular
          if grep -r "azurewebsites.net" . \
            --include="*.ts" \
            --exclude-dir="node_modules"; then
            echo "ERROR: Hardcoded azurewebsites.net URL found in Angular"
            exit 1
          fi

          echo "Security scan passed — no hardcoded secrets found"

  # ─────────────────────────────────────────
  # SUMMARY — All jobs must pass
  # ─────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - build-auth
      - build-product
      - build-inventory
      - build-order
      - build-payment
      - build-notification
      - build-recommendation
      - build-ai
      - validate-ef-migrations
      - build-ui
      - validate-helm
      - validate-bicep
      - security-scan

    steps:
      - name: All checks passed
        run: |
          echo "=========================================="
          echo "CI passed — PR is safe to merge"
          echo "=========================================="
          echo "✓ AuthService builds"
          echo "✓ ProductService builds"
          echo "✓ InventoryService builds"
          echo "✓ OrderService builds"
          echo "✓ PaymentService builds"
          echo "✓ NotificationService builds"
          echo "✓ RecommendationService builds"
          echo "✓ AiService builds"
          echo "✓ EF Core migrations valid (Order/Payment)"
          echo "✓ Angular UI builds"
          echo "✓ Helm charts valid"
          echo "✓ Bicep templates valid"
          echo "✓ No hardcoded secrets"
          echo "=========================================="
