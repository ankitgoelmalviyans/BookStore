name: CI — Build and Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - Upgrade_BookStore

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build and test AuthService
  # ─────────────────────────────────────────
  build-auth:
    name: Build AuthService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            AuthService/AuthService.sln

      - name: Build
        run: |
          dotnet build \
            AuthService/AuthService.sln \
            --no-restore \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: AuthService/src/AuthService
          file: AuthService/src/AuthService/Dockerfile
          push: false
          tags: authservice:ci

  # ─────────────────────────────────────────
  # JOB 2 — Build and test ProductService
  # ─────────────────────────────────────────
  build-product:
    name: Build ProductService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.ProductSCA/BookStore.ProductService/BookStore.ProductService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.ProductSCA/BookStore.ProductService/BookStore.ProductService.sln \
            --no-restore \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.ProductService/src
          file: BookStore.ProductSCA/BookStore.ProductService/src/BookStore.ProductService.API/Dockerfile
          push: false
          tags: productservice:ci

  # ─────────────────────────────────────────
  # JOB 3 — Build and test InventoryService
  # ─────────────────────────────────────────
  build-inventory:
    name: Build InventoryService
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore \
            BookStore.ProductSCA/BookStore.InventoryService/BookStore.InventoryService.sln

      - name: Build
        run: |
          dotnet build \
            BookStore.ProductSCA/BookStore.InventoryService/BookStore.InventoryService.sln \
            --no-restore \
            --configuration Release

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.InventoryService
          file: BookStore.ProductSCA/BookStore.InventoryService/InventoryService.API/Dockerfile
          push: false
          tags: inventoryservice:ci

  # ─────────────────────────────────────────
  # JOB 4 — Build Angular UI
  # ─────────────────────────────────────────
  build-ui:
    name: Build Angular UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            BookStore.ProductSCA/product-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd BookStore.ProductSCA/product-ui
          npm ci

      - name: Build production
        run: |
          cd BookStore.ProductSCA/product-ui
          npx ng build --configuration production \
            --base-href /BookStore/

  # ─────────────────────────────────────────
  # JOB 5 — Validate Helm charts
  # ─────────────────────────────────────────
  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Helm dependency update
        run: |
          helm dependency update infrastructure/helm/authservice
          helm dependency update infrastructure/helm/productservice
          helm dependency update infrastructure/helm/inventoryservice

      - name: Helm lint
        run: |
          helm lint infrastructure/helm/authservice
          helm lint infrastructure/helm/productservice
          helm lint infrastructure/helm/inventoryservice

      - name: Helm dry run — Profile A
        run: |
          helm template authservice infrastructure/helm/authservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template productservice infrastructure/helm/productservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          helm template inventoryservice infrastructure/helm/inventoryservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set ingress.host=1.2.3.4.nip.io \
            --set image.tag=ci-test \
            > /dev/null

          echo "Helm dry run passed for Profile A"

  # ─────────────────────────────────────────
  # JOB 6 — Validate Bicep
  # ─────────────────────────────────────────
  validate-bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep
        run: az bicep install

      - name: Validate Bicep syntax — main
        run: |
          az bicep build \
            --file infrastructure/bicep/main.bicep
          echo "main.bicep syntax valid"

      - name: Validate Bicep syntax — demo
        run: |
          az bicep build \
            --file infrastructure/bicep/main.demo.bicep
          echo "main.demo.bicep syntax valid"

  # ─────────────────────────────────────────
  # JOB 7 — Security scan
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."

          # Check for connection strings
          if grep -r "AccountKey=" . \
            --include="*.json" \
            --include="*.cs" \
            --include="*.ts" \
            --exclude-dir=".azure-pipelines-reference" \
            --exclude-dir="bin" \
            --exclude-dir="obj" \
            --exclude-dir="node_modules" | grep -v "AccountKey=\"\""; then
            echo "ERROR: Hardcoded AccountKey found"
            exit 1
          fi

          # Check for passwords
          if grep -r "Password=" . \
            --include="*.json" \
            --include="*.cs" \
            --exclude-dir=".azure-pipelines-reference" \
            --exclude-dir="bin" \
            --exclude-dir="obj" \
            --exclude-dir="node_modules" | grep -v "Password=\"\"" \
            | grep -v "#{" ; then
            echo "ERROR: Hardcoded password found"
            exit 1
          fi

          # Check for azurewebsites.net URLs in Angular
          if grep -r "azurewebsites.net" . \
            --include="*.ts" \
            --exclude-dir="node_modules"; then
            echo "ERROR: Hardcoded azurewebsites.net URL found in Angular"
            exit 1
          fi

          echo "Security scan passed — no hardcoded secrets found"

  # ─────────────────────────────────────────
  # SUMMARY — All jobs must pass
  # ─────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - build-auth
      - build-product
      - build-inventory
      - build-ui
      - validate-helm
      - validate-bicep
      - security-scan

    steps:
      - name: All checks passed
        run: |
          echo "=========================================="
          echo "CI passed — PR is safe to merge"
          echo "=========================================="
          echo "✓ AuthService builds"
          echo "✓ ProductService builds"
          echo "✓ InventoryService builds"
          echo "✓ Angular UI builds"
          echo "✓ Helm charts valid"
          echo "✓ Bicep templates valid"
          echo "✓ No hardcoded secrets"
          echo "=========================================="
