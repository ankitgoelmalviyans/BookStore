name: Sync Help Docs to Azure Blob

on:
  push:
    branches: [main]
    paths:
      - 'docs/help/**'

jobs:
  sync-help-docs:
    name: Sync PDFs to Azure Blob Storage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync help docs to Blob Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob sync \
              --source ./docs/help \
              --container bookstore-help-docs \
              --account-name ${{ secrets.HELP_DOCS_STORAGE_ACCOUNT }} \
              --delete-destination true
