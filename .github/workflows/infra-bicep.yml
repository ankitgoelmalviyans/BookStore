name: Infrastructure — Bicep (Always-On)

on:
  push:
    paths:
      - 'infrastructure/bicep/**'
    branches:
      - main
  workflow_dispatch:

env:
  RESOURCE_GROUP: BookStoreRG_GA
  LOCATION: centralindia

jobs:
  deploy-infra:
    name: Deploy Core Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Register ContainerService Provider
        run: |
          az provider register --namespace Microsoft.ContainerService
          for i in {1..10}; do
            STATE=$(az provider show \
              --namespace Microsoft.ContainerService \
              --query registrationState -o tsv)
            echo "State: $STATE"
            if [ "$STATE" == "Registered" ]; then break; fi
            sleep 10
          done

      - name: Enable Cosmos DB Vector Search capability
        run: |
          # bscosmosankit2026ga was created by an earlier run of this workflow, before the
          # BookEmbeddings container (vectorEmbeddingPolicy/vectorIndexes) existed. Cosmos DB
          # does not retroactively apply new entries in the account's `capabilities` list from
          # a Bicep/ARM update on an already-existing account — EnableNoSQLVectorSearch has to
          # be turned on via this self-serve update path (or the portal's Features blade) first.
          ACCOUNT_NAME=bscosmosankit2026ga

          if ! az cosmosdb show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name $ACCOUNT_NAME \
              --output none 2>/dev/null; then
            echo "Account $ACCOUNT_NAME doesn't exist yet — Bicep will create it below with the capability already set."
            exit 0
          fi

          # Real failures here (auth, throttling, service errors) must fail the job — only
          # "account not found" above is a legitimate no-op.
          az cosmosdb update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name $ACCOUNT_NAME \
            --capabilities EnableNoSQLVectorSearch \
            --output none

          echo "Waiting for EnableNoSQLVectorSearch to report active on $ACCOUNT_NAME..."
          for i in {1..30}; do
            ENABLED=$(az cosmosdb show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name $ACCOUNT_NAME \
              --query "length(capabilities[?name=='EnableNoSQLVectorSearch'])" \
              --output tsv)
            if [ "$ENABLED" == "1" ]; then
              echo "EnableNoSQLVectorSearch is active."
              exit 0
            fi
            echo "Not active yet (attempt $i/30) — sleeping 20s..."
            sleep 20
          done

          echo "::error::EnableNoSQLVectorSearch did not become active on $ACCOUNT_NAME within 10 minutes."
          exit 1

      - name: Deploy Bicep — Core Resources
        id: bicep
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters @infrastructure/bicep/parameters/main.parameters.json \
            --parameters "sqlAdminPassword=$SQL_ADMIN_PASSWORD" \
            --query properties.outputs \
            --output json)

          echo "COSMOS_ENDPOINT=$(echo $OUTPUT | jq -r .cosmosEndpoint.value)" >> $GITHUB_ENV
          echo "ACR_SERVER=$(echo $OUTPUT | jq -r .acrLoginServer.value)" >> $GITHUB_ENV
          echo "AKS_NAME=$(echo $OUTPUT | jq -r .aksClusterName.value)" >> $GITHUB_ENV
          echo "SQL_SERVER_FQDN=$(echo $OUTPUT | jq -r .sqlServerFqdn.value)" >> $GITHUB_ENV

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_NAME }} \
            --overwrite-existing

      - name: Attach ACR to AKS
        run: |
          az aks update \
            --name ${{ env.AKS_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --attach-acr bookstoreaurega || true

      - name: Create Static Public IP
        run: |
          MC_RG=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_NAME }} \
            --query nodeResourceGroup \
            --output tsv)

          # Create static IP if not exists
          az network public-ip create \
            --resource-group $MC_RG \
            --name bookstore-static-ip \
            --sku Standard \
            --allocation-method Static \
            --location ${{ env.LOCATION }} || true

          # Get the static IP
          STATIC_IP=$(az network public-ip show \
            --resource-group $MC_RG \
            --name bookstore-static-ip \
            --query ipAddress \
            --output tsv)

          echo "STATIC_IP=$STATIC_IP" >> $GITHUB_ENV
          echo "INGRESS_IP=$STATIC_IP" >> $GITHUB_ENV
          echo "Static IP: $STATIC_IP"

      - name: Install NGINX Ingress via Helm
        run: |
          helm repo add ingress-nginx \
            https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.replicaCount=1 \
            --set controller.nodeSelector."kubernetes\.io/os"=linux \
            --set controller.defaultBackend.enabled=true \
            --set controller.service.loadBalancerIP=${{ env.STATIC_IP }} \
            --wait

      - name: Fix Azure LB Health Probe for NGINX
        run: |
          kubectl annotate svc ingress-nginx-controller \
            -n ingress-nginx \
            service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path=/healthz \
            --overwrite
          echo "LB probe fixed — external traffic routing correctly"

      - name: Fix Azure LB Health Probe Path
        run: |
          kubectl annotate svc ingress-nginx-controller \
            -n ingress-nginx \
            service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path=/healthz \
            --overwrite

      - name: Install Cert Manager via Helm
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set installCRDs=true \
            --wait

      - name: Install istioctl
        env:
          # Pinned, not "latest" — an unpinned curl|sh means a rerun months from now can silently
          # install a different, untested istioctl/control-plane version. Bump deliberately; see
          # https://istio.io/latest/docs/releases/supported-releases/ for current supported versions.
          ISTIO_VERSION: "1.30.2"
        run: |
          curl -L https://istio.io/downloadIstio | ISTIO_VERSION="$ISTIO_VERSION" sh -
          ISTIO_DIR=$(find "$PWD" -maxdepth 1 -name "istio-*" -type d | head -n1)
          echo "$ISTIO_DIR/bin" >> $GITHUB_PATH

      - name: Install Istio (minimal profile — see infrastructure/istio/istio-operator-minimal.yaml)
        run: |
          istioctl install -f infrastructure/istio/istio-operator-minimal.yaml -y --skip-confirmation

          echo "Waiting for istiod to become ready..."
          kubectl -n istio-system rollout status deployment/istiod --timeout=180s

      - name: Apply Istio mTLS policy
        run: |
          # peer-authentication.yaml targets namespace: bookstore, but this workflow (unlike
          # cd-costopt.yml) never otherwise creates it. On a genuinely fresh cluster — the exact
          # scenario this "Always-On" infra workflow exists for — the apply below would fail
          # outright without this. Idempotent, same pattern cd-costopt.yml already uses.
          kubectl get namespace bookstore || kubectl create namespace bookstore

          kubectl apply -f infrastructure/istio/peer-authentication.yaml

      - name: Check node fit after Istio install
        run: |
          echo "=========================================="
          echo "Node resource usage after Istio control plane install:"
          echo "(If this is already tight, do NOT proceed to inject sidecars —"
          echo " see infrastructure/istio/README.md for the rollback command.)"
          echo "=========================================="
          kubectl top nodes || echo "metrics-server data not ready yet — check again in a minute."
          kubectl get pods -n istio-system -o wide
          echo ""
          echo "NOTE: Product/Inventory pods do NOT have sidecars yet — the injection annotation"
          echo "only takes effect when a pod is (re)created. Run cd-costopt.yml next (or push any"
          echo "commit) so those two services' pods get recreated and pick up the sidecar."

      - name: Create Let's Encrypt ClusterIssuer
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: admin@bookstore.com
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
              - http01:
                  ingress:
                    class: nginx
          EOF

      - name: Get Ingress Public IP
        run: |
          FOUND=""
          for i in {1..20}; do
            IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            echo "Current IP: $IP"
            if [ -n "$IP" ]; then
              echo "INGRESS_IP=$IP" >> $GITHUB_ENV
              FOUND="$IP"
              break
            fi
            sleep 15
          done
          if [ -z "$FOUND" ]; then
            echo "::error::ingress-nginx-controller LoadBalancer never got an external IP after 20 attempts (5 minutes) — aborting before printing DNS/secret instructions."
            exit 1
          fi

      - name: Allow HTTP and HTTPS through NSG
        run: |
          MC_RG=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_NAME }} \
            --query nodeResourceGroup \
            --output tsv)

          echo "Managed RG: $MC_RG"

          NSG=$(az network nsg list \
            --resource-group $MC_RG \
            --query "[0].name" \
            --output tsv)

          echo "Found NSG: $NSG"

          az network nsg rule create \
            --resource-group $MC_RG \
            --nsg-name $NSG \
            --name AllowHTTP \
            --priority 100 \
            --destination-port-ranges 80 \
            --access Allow \
            --protocol Tcp \
            --direction Inbound || true

          az network nsg rule create \
            --resource-group $MC_RG \
            --nsg-name $NSG \
            --name AllowHTTPS \
            --priority 110 \
            --destination-port-ranges 443 \
            --access Allow \
            --protocol Tcp \
            --direction Inbound || true

          echo "NSG rules added — HTTP and HTTPS now open"

      - name: Print Summary
        run: |
          echo "=========================================="
          echo "Infrastructure deployed successfully"
          echo "Ingress IP:     ${{ env.INGRESS_IP }}"
          echo "Cosmos:         ${{ env.COSMOS_ENDPOINT }}"
          echo "ACR:            ${{ env.ACR_SERVER }}"
          echo "SQL Server:     ${{ env.SQL_SERVER_FQDN }}"
          echo "=========================================="
          echo ""
          echo "ACTION REQUIRED:"
          echo "  1. Point your domain's DNS A record at INGRESS_IP above (e.g. bookstore.ankitgoel.co.in -> ${{ env.INGRESS_IP }})"
          echo "  2. Add these to GitHub Secrets:"
          echo "  INGRESS_IP        = ${{ env.INGRESS_IP }}"
          echo "  INGRESS_HOST      = bookstore.ankitgoel.co.in"
          echo "  AUTH_API_URL      = https://bookstore.ankitgoel.co.in/auth/api"
          echo "  PRODUCT_API_URL   = https://bookstore.ankitgoel.co.in/product/api"
          echo "  INVENTORY_API_URL = https://bookstore.ankitgoel.co.in/inventory/api"
          echo "  ALLOWED_ORIGINS   = https://ankitgoelmalviyans.github.io  (the SPA's origin — NOT the ingress host; CORS matches against the browser's Origin header)"
          echo ""
          echo "  AuthDb + Phase 2 SQL (OrderService/PaymentService) — build these from"
          echo "  SQL_SERVER_FQDN above + the SQL_ADMIN_PASSWORD you set + sqlAdminLogin (default"
          echo "  'bookstoreadmin', see infrastructure/bicep/sql-order-payment.bicep):"
          echo "  AUTH_SQL_CONNECTION    = Server=tcp:${{ env.SQL_SERVER_FQDN }},1433;Initial Catalog=AuthDb;User ID=bookstoreadmin;Password=<SQL_ADMIN_PASSWORD>;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "  ORDER_SQL_CONNECTION   = Server=tcp:${{ env.SQL_SERVER_FQDN }},1433;Initial Catalog=OrderDb;User ID=bookstoreadmin;Password=<SQL_ADMIN_PASSWORD>;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "  PAYMENT_SQL_CONNECTION = Server=tcp:${{ env.SQL_SERVER_FQDN }},1433;Initial Catalog=PaymentDb;User ID=bookstoreadmin;Password=<SQL_ADMIN_PASSWORD>;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "  (cd-costopt.yml's Auth DB-backed login and Order/Payment migration, seed, and"
          echo "  deploy steps stay no-ops until their respective secrets are set — see"
          echo "  docs/ROADMAP.md. AUTH_USERNAME/AUTH_PASSWORD (already set) become the seeded"
          echo "  user's credentials once AUTH_SQL_CONNECTION is set — no new credential secret"
          echo "  needed.)"