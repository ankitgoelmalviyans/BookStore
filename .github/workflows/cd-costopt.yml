name: CD — Deploy (Profile A Cost-Optimised)

on:
  workflow_run:
    workflows: ["CI — Build and Validate"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  RESOURCE_GROUP: BookStoreRG_GA
  AKS_CLUSTER: bookstore-aks-ga
  ACR_SERVER: bookstoreaurega.azurecr.io
  NAMESPACE: bookstore

# None of these jobs push to git or otherwise need repo write access — they push images to ACR
# (via ACR_USERNAME/ACR_PASSWORD) and deploy via AZURE_CREDENTIALS, not GITHUB_TOKEN. Pinning to
# read-only here means a compromised step (e.g. a malicious Dockerfile build stage) can't abuse an
# org/repo default that grants broader GITHUB_TOKEN permissions.
permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build and push AuthService
  # ─────────────────────────────────────────
  build-push-auth:
    name: Build and Push AuthService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/authservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push AuthService
        uses: docker/build-push-action@v5
        with:
          context: AuthService/src/AuthService
          file: AuthService/src/AuthService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 2 — Build and push ProductService
  # ─────────────────────────────────────────
  build-push-product:
    name: Build and Push ProductService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/productservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push ProductService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.ProductService/src
          file: BookStore.ProductSCA/BookStore.ProductService/src/BookStore.ProductService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 3 — Build and push InventoryService
  # ─────────────────────────────────────────
  build-push-inventory:
    name: Build and Push InventoryService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/inventoryservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push InventoryService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.ProductSCA/BookStore.InventoryService
          file: BookStore.ProductSCA/BookStore.InventoryService/InventoryService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 4 — Build and push OrderService
  # ─────────────────────────────────────────
  build-push-order:
    name: Build and Push OrderService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Source-only checkout — this job never pushes back to git, so don't leave the token in
          # .git/config for the rest of the job (e.g. the Docker build step) to read.
          persist-credentials: false

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/orderservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push OrderService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.OrderService/src
          file: BookStore.OrderSCA/BookStore.OrderService/src/BookStore.OrderService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 5 — Build and push PaymentService
  # ─────────────────────────────────────────
  build-push-payment:
    name: Build and Push PaymentService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Source-only checkout — this job never pushes back to git, so don't leave the token in
          # .git/config for the rest of the job (e.g. the Docker build step) to read.
          persist-credentials: false

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/paymentservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push PaymentService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.PaymentService/src
          file: BookStore.OrderSCA/BookStore.PaymentService/src/BookStore.PaymentService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 6 — Build and push NotificationService
  # ─────────────────────────────────────────
  build-push-notification:
    name: Build and Push NotificationService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Source-only checkout — this job never pushes back to git, so don't leave the token in
          # .git/config for the rest of the job (e.g. the Docker build step) to read.
          persist-credentials: false

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/notificationservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push NotificationService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.OrderSCA/BookStore.NotificationService/src
          file: BookStore.OrderSCA/BookStore.NotificationService/src/BookStore.NotificationService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 6b — Build and push RecommendationService
  # ─────────────────────────────────────────
  build-push-recommendation:
    name: Build and Push RecommendationService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/recommendationservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push RecommendationService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.AiSCA/BookStore.RecommendationService/src
          file: BookStore.AiSCA/BookStore.RecommendationService/src/BookStore.RecommendationService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 6c — Build and push AiService
  # ─────────────────────────────────────────
  build-push-ai:
    name: Build and Push AiService
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_SERVER }}/aiservice:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push AiService
        uses: docker/build-push-action@v5
        with:
          context: BookStore.AiSCA/BookStore.AiService/src
          file: BookStore.AiSCA/BookStore.AiService/src/BookStore.AiService.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 7 — Deploy all services to AKS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs:
      - build-push-auth
      - build-push-product
      - build-push-inventory
      - build-push-order
      - build-push-payment
      - build-push-notification
      - build-push-recommendation
      - build-push-ai
    env:
      # Mirrored from secrets into env so step `if:` conditions can check "is this set" without
      # referencing the secrets context directly in an expression.
      AUTH_SQL_CONNECTION: ${{ secrets.AUTH_SQL_CONNECTION }}
      ORDER_SQL_CONNECTION: ${{ secrets.ORDER_SQL_CONNECTION }}
      PAYMENT_SQL_CONNECTION: ${{ secrets.PAYMENT_SQL_CONNECTION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing
            
      - name: Ensure NGINX Ingress is ready
        run: |
          kubectl rollout status deployment/ingress-nginx-controller \
            -n ingress-nginx --timeout=5m || true

          kubectl annotate svc ingress-nginx-controller \
            -n ingress-nginx \
            service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path=/healthz \
            --overwrite

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Create namespace
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} || \
          kubectl create namespace ${{ env.NAMESPACE }}

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic authservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Auth__Username="${{ secrets.AUTH_USERNAME }}" \
            --from-literal=Auth__Password="${{ secrets.AUTH_PASSWORD }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic productservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=CosmosDb__CosmosEndpoint="${{ secrets.COSMOS_ENDPOINT }}" \
            --from-literal=CosmosDb__AccountKey="${{ secrets.COSMOS_KEY }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic inventoryservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=CosmosDb__CosmosEndpoint="${{ secrets.COSMOS_ENDPOINT }}" \
            --from-literal=CosmosDb__AccountKey="${{ secrets.COSMOS_KEY }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=AzureServiceBus__TopicName="product-events" \
            --from-literal=AzureServiceBus__SubscriptionName="inventory-subscription" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --from-literal=Reservations__Enabled="true" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic notificationservice-secrets \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=Notifications__Enabled="true" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Phase 3 — classic ML, no SQL dependency, deploys unconditionally (order-events topology
          # already provisioned). The read API works regardless of Recommendations__Enabled — that
          # flag only gates the order-events subscriber.
          kubectl create secret generic recommendationservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=CosmosDb__CosmosEndpoint="${{ secrets.COSMOS_ENDPOINT }}" \
            --from-literal=CosmosDb__AccountKey="${{ secrets.COSMOS_KEY }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --from-literal=Recommendations__Enabled="true" \
            --from-literal=Recommendations__ModelTrainingEnabled="true" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Phase 3 — RAG. No SQL dependency, deploys unconditionally (product-events topology
          # already provisioned). AZURE_OPENAI_KEY/AZURE_OPENAI_ENDPOINT come from a separately
          # provisioned Azure OpenAI resource in its own account (see StartupExtensions) — an unset
          # key just means the pod falls back to its built-in deterministic fakes, same posture as
          # PaymentService's Stripe__SecretKey/FakePaymentGateway. Ai__IngestionEnabled only gates
          # the product-events subscriber; the search endpoint works regardless (nothing indexed yet
          # until then).
          kubectl create secret generic aiservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=CosmosDb__CosmosEndpoint="${{ secrets.COSMOS_ENDPOINT }}" \
            --from-literal=CosmosDb__AccountKey="${{ secrets.COSMOS_KEY }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --from-literal=Ai__IngestionEnabled="true" \
            --from-literal=AzureOpenAI__Endpoint="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AzureOpenAI__Key="${{ secrets.AZURE_OPENAI_KEY }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Gated the same way as Order/Payment below, for the same reason: applying this with an
      # empty ConnectionStrings__AuthDb when AUTH_SQL_CONNECTION is unset would silently overwrite
      # a *running* authservice release's secret with a broken connection string the moment its
      # pods next restart for any unrelated reason (node drain, OOM, HPA scale-event...). Must
      # re-specify every key `kubectl create secret` would otherwise set, since `apply` replaces
      # the whole secret object, not just the one new field.
      - name: Set AuthDb connection string on authservice secret
        if: ${{ env.AUTH_SQL_CONNECTION != '' }}
        run: |
          kubectl create secret generic authservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Auth__Username="${{ secrets.AUTH_USERNAME }}" \
            --from-literal=Auth__Password="${{ secrets.AUTH_PASSWORD }}" \
            --from-literal=ConnectionStrings__AuthDb="${{ secrets.AUTH_SQL_CONNECTION }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Phase 2 — OrderService/PaymentService secrets are gated the same way their Deploy steps
      # are. Unlike the unconditional secrets above, applying these with an empty
      # ConnectionStrings value when the SQL secret is unset would silently overwrite a *running*
      # release's secret with a broken connection string the moment its pods next restart (node
      # drain, OOM, HPA scale-event...) even though nothing here failed loudly. Skipping the step
      # entirely leaves whatever secret (if any) already exists untouched.
      - name: Create OrderService Kubernetes secret
        if: ${{ env.ORDER_SQL_CONNECTION != '' }}
        run: |
          kubectl create secret generic orderservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=ConnectionStrings__OrderDb="${{ secrets.ORDER_SQL_CONNECTION }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=Orders__InboundEnabled="true" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create PaymentService Kubernetes secret
        if: ${{ env.PAYMENT_SQL_CONNECTION != '' }}
        run: |
          kubectl create secret generic paymentservice-secrets \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=ConnectionStrings__PaymentDb="${{ secrets.PAYMENT_SQL_CONNECTION }}" \
            --from-literal=AzureServiceBus__ConnectionString="${{ secrets.SERVICE_BUS_CONNECTION }}" \
            --from-literal=Stripe__SecretKey="${{ secrets.STRIPE_TEST_SECRET_KEY }}" \
            --from-literal=AllowedOrigins__0="${{ secrets.ALLOWED_ORIGINS }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # If a SQL secret is ever unset *after* its service was already deployed (e.g. accidentally
      # removed from repo secrets), don't leave a stale release running against a k8s secret we
      # just chose not to update — fail loudly so the operator notices, rather than silently
      # skipping the Deploy step below and reporting overall success.
      - name: Guard — OrderService config removed after deploy
        if: ${{ env.ORDER_SQL_CONNECTION == '' }}
        run: |
          if helm status orderservice -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "::error::orderservice is already deployed but ORDER_SQL_CONNECTION is now unset. Restore the secret, or run 'helm uninstall orderservice -n ${{ env.NAMESPACE }}' to deliberately remove it, before re-running this workflow."
            exit 1
          fi
          echo "orderservice not yet deployed and ORDER_SQL_CONNECTION unset — nothing to do."

      - name: Guard — PaymentService config removed after deploy
        if: ${{ env.PAYMENT_SQL_CONNECTION == '' }}
        run: |
          if helm status paymentservice -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "::error::paymentservice is already deployed but PAYMENT_SQL_CONNECTION is now unset. Restore the secret, or run 'helm uninstall paymentservice -n ${{ env.NAMESPACE }}' to deliberately remove it, before re-running this workflow."
            exit 1
          fi
          echo "paymentservice not yet deployed and PAYMENT_SQL_CONNECTION unset — nothing to do."

      - name: Helm dependency update
        run: |
          helm dependency update infrastructure/helm/authservice
          helm dependency update infrastructure/helm/productservice
          helm dependency update infrastructure/helm/inventoryservice
          helm dependency update infrastructure/helm/orderservice
          helm dependency update infrastructure/helm/paymentservice
          helm dependency update infrastructure/helm/notificationservice
          helm dependency update infrastructure/helm/recommendationservice
          helm dependency update infrastructure/helm/aiservice

      - name: Get short SHA
        id: sha
        run: |
          echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # Fail fast, before any Helm install/upgrade renders manifests, if the ingress hostname is
      # missing or malformed — every Deploy step below reuses this validated value for both the
      # ingress rule host and the shared TLS secret's host (see _ingress.yaml).
      - name: Validate INGRESS_HOST secret
        run: |
          HOST="${{ secrets.INGRESS_HOST }}"
          if [ -z "$HOST" ]; then
            echo "::error::INGRESS_HOST secret is not set — required for ingress.host and the shared TLS cert host."
            exit 1
          fi
          if ! [[ "$HOST" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$ ]]; then
            echo "::error::INGRESS_HOST secret is not a valid hostname: $HOST"
            exit 1
          fi
          echo "INGRESS_HOST=$HOST" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────────────────────
      # Phase 2 SQL migrations — gated on the SQL server actually existing.
      # infra-bicep.yml provisions OrderDb/PaymentDb (free-tier Azure SQL
      # Serverless, see infrastructure/bicep/sql-order-payment.bicep), but
      # can't write GitHub secrets back into the repo — so ORDER_SQL_CONNECTION/
      # PAYMENT_SQL_CONNECTION are set once by the operator from that
      # workflow's printed SQL_SERVER_FQDN + the SQL_ADMIN_PASSWORD they
      # chose, the same pattern already used for COSMOS_ENDPOINT/COSMOS_KEY.
      # Until they're set, these steps (and the two Deploy steps below) are
      # no-ops — everything else in this job runs unaffected.
      # ─────────────────────────────────────────────────────────────────────
      - name: Setup .NET (Auth/Order/Payment migrations + seed)
        if: ${{ env.AUTH_SQL_CONNECTION != '' || env.ORDER_SQL_CONNECTION != '' || env.PAYMENT_SQL_CONNECTION != '' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Apply AuthDb migrations + seed user
        if: ${{ env.AUTH_SQL_CONNECTION != '' }}
        working-directory: AuthService/src/AuthService
        env:
          AUTH_DB_CONNECTION: ${{ secrets.AUTH_SQL_CONNECTION }}
          ConnectionStrings__AuthDb: ${{ secrets.AUTH_SQL_CONNECTION }}
          Auth__Username: ${{ secrets.AUTH_USERNAME }}
          Auth__Password: ${{ secrets.AUTH_PASSWORD }}
        run: |
          dotnet tool restore
          dotnet ef database update --context AuthDbContext
          dotnet run -- --seed

      - name: Apply OrderDb migrations + seed demo data
        if: ${{ env.ORDER_SQL_CONNECTION != '' }}
        working-directory: BookStore.OrderSCA/BookStore.OrderService
        env:
          ORDER_DB_CONNECTION: ${{ secrets.ORDER_SQL_CONNECTION }}
          ConnectionStrings__OrderDb: ${{ secrets.ORDER_SQL_CONNECTION }}
        run: |
          dotnet tool restore
          dotnet ef database update \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.OrderService.API/BookStore.OrderService.API.csproj \
            --context OrderDbContext
          dotnet run --project src/BookStore.OrderService.API/BookStore.OrderService.API.csproj -- --seed

      - name: Apply PaymentDb migrations + seed demo data
        if: ${{ env.PAYMENT_SQL_CONNECTION != '' }}
        working-directory: BookStore.OrderSCA/BookStore.PaymentService
        env:
          PAYMENT_DB_CONNECTION: ${{ secrets.PAYMENT_SQL_CONNECTION }}
          ConnectionStrings__PaymentDb: ${{ secrets.PAYMENT_SQL_CONNECTION }}
        run: |
          dotnet tool restore
          dotnet ef database update \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/BookStore.PaymentService.API/BookStore.PaymentService.API.csproj \
            --context PaymentDbContext
          dotnet run --project src/BookStore.PaymentService.API/BookStore.PaymentService.API.csproj -- --seed

      # Gated on AUTH_SQL_CONNECTION, same as Order/Payment below — until that secret is set, this
      # step is skipped and the currently-running authservice release (whatever version it's on) is
      # left untouched rather than redeployed with code that now requires a database it can't reach.
      - name: Deploy AuthService
        if: ${{ env.AUTH_SQL_CONNECTION != '' }}
        run: |
          helm upgrade --install authservice \
            infrastructure/helm/authservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      - name: Deploy ProductService
        run: |
          helm upgrade --install productservice \
            infrastructure/helm/productservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      - name: Deploy InventoryService
        run: |
          helm upgrade --install inventoryservice \
            infrastructure/helm/inventoryservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      - name: Deploy OrderService
        if: ${{ env.ORDER_SQL_CONNECTION != '' }}
        run: |
          helm upgrade --install orderservice \
            infrastructure/helm/orderservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      - name: Deploy PaymentService
        if: ${{ env.PAYMENT_SQL_CONNECTION != '' }}
        run: |
          helm upgrade --install paymentservice \
            infrastructure/helm/paymentservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      # No SQL dependency — deploys unconditionally, same as auth/product/inventory.
      - name: Deploy NotificationService
        run: |
          helm upgrade --install notificationservice \
            infrastructure/helm/notificationservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      # No SQL dependency — deploys unconditionally, same as NotificationService.
      - name: Deploy RecommendationService
        run: |
          helm upgrade --install recommendationservice \
            infrastructure/helm/recommendationservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      # No SQL dependency — deploys unconditionally, same as NotificationService. AzureOpenAI:Key
      # being unset doesn't block this — the pod just runs with the built-in fake AI clients.
      - name: Deploy AiService
        run: |
          helm upgrade --install aiservice \
            infrastructure/helm/aiservice \
            --values infrastructure/helm/values-costopt.yaml \
            --set image.tag=${{ steps.sha.outputs.short }} \
            --set-string ingress.host=${{ env.INGRESS_HOST }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 5m

      - name: Create Splunk secret
        run: |
          kubectl create secret generic splunk-secrets \
            --from-literal=SPLUNK_HEC_TOKEN="${{ secrets.SPLUNK_HEC_TOKEN }}" \
            --namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Fluent Bit
        run: |
          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo update
          helm upgrade --install fluent-bit fluent/fluent-bit \
            --namespace ${{ env.NAMESPACE }} \
            --values infrastructure/helm/fluent-bit/values.yaml \
            --wait \
            --timeout 3m
          echo "Fluent Bit deployed — logs shipping to Splunk"

      - name: Health checks
        run: |
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/authservice \
            -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/productservice \
            -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/inventoryservice \
            -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/notificationservice \
            -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/recommendationservice \
            -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/aiservice \
            -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Health check OrderService
        if: ${{ env.ORDER_SQL_CONNECTION != '' }}
        run: |
          kubectl rollout status deployment/orderservice \
            -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Health check PaymentService
        if: ${{ env.PAYMENT_SQL_CONNECTION != '' }}
        run: |
          kubectl rollout status deployment/paymentservice \
            -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Verify health endpoints
        run: |
          echo "All services confirmed healthy via kubectl rollout status"
          echo "=========================================="
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo "=========================================="

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          helm rollback authservice -n ${{ env.NAMESPACE }} || true
          helm rollback productservice -n ${{ env.NAMESPACE }} || true
          helm rollback inventoryservice -n ${{ env.NAMESPACE }} || true
          helm rollback orderservice -n ${{ env.NAMESPACE }} || true
          helm rollback paymentservice -n ${{ env.NAMESPACE }} || true
          helm rollback notificationservice -n ${{ env.NAMESPACE }} || true
          helm rollback recommendationservice -n ${{ env.NAMESPACE }} || true
          helm rollback aiservice -n ${{ env.NAMESPACE }} || true
          echo "Rollback complete"

      - name: Print deployment summary
        if: success()
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "=========================================="
          echo "Deployment successful — Profile A"
          echo "=========================================="
          echo "Image tag:    $SHORT_SHA"
          echo "Auth:         https://${{ env.INGRESS_HOST }}/auth"
          if [ -z "$AUTH_SQL_CONNECTION" ]; then
            echo "              (AUTH_SQL_CONNECTION unset — still running the previously deployed"
            echo "              version, not the DB-backed login; set the secret and re-run to switch.)"
          fi
          echo "Product:      https://${{ env.INGRESS_HOST }}/product"
          echo "Inventory:    https://${{ env.INGRESS_HOST }}/inventory"
          echo "Notification: https://${{ env.INGRESS_HOST }}/notification"
          echo "Recommendation: https://${{ env.INGRESS_HOST }}/recommendation"
          echo "Ai:           https://${{ env.INGRESS_HOST }}/ai"
          if [ -z "${{ secrets.AZURE_OPENAI_KEY }}" ]; then
            echo "              (AZURE_OPENAI_KEY unset — AiService is running its built-in fake"
            echo "              embedding/answer clients, not real Azure OpenAI.)"
          fi
          # Derived from actual Helm release state, not just whether this run's secret was set —
          # a release deployed in an earlier run stays reported as deployed even if the secret
          # was removed since (the Guard step above would already have failed this run in that
          # case, so reaching here means state and secret agree).
          if helm status orderservice -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "Order:        https://${{ env.INGRESS_HOST }}/order"
          else
            echo "Order:        not deployed (ORDER_SQL_CONNECTION secret unset)"
          fi
          if helm status paymentservice -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
            echo "Payment:      https://${{ env.INGRESS_HOST }}/payment"
          else
            echo "Payment:      not deployed (PAYMENT_SQL_CONNECTION secret unset)"
          fi
          echo "=========================================="
