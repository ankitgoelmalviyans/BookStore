<div class="page">
  <mat-card>
    <div class="header-row">
      <h2>Products</h2>
      <button mat-raised-button color="primary" (click)="addProduct()">
        <mat-icon>add</mat-icon> Add Product
      </button>
    </div>

    @if (loading) {
      <div class="loading-row">
        <mat-spinner diameter="28"></mat-spinner>
      </div>
    }

    @if (!loading) {
    <table mat-table [dataSource]="products" class="mat-elevation-z1">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let element">₹{{ element.price }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let element">{{ element.category }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="addToCart(element)" [disabled]="!element.price || element.price <= 0"
                  aria-label="Add to cart" [title]="element.price > 0 ? 'Add to cart' : 'No price set — cannot be ordered'">
            <mat-icon>add_shopping_cart</mat-icon>
          </button>
          <button mat-button color="accent" (click)="editProduct(element.id)">Edit</button>
          <button mat-button color="warn" (click)="deleteProduct(element.id)">Delete</button>
          <button mat-button (click)="viewInventory(element.id)">Inventory</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    }
  </mat-card>
</div>
