<div class="page">
  <mat-card>
    <h2>Your Cart</h2>

    <ng-container *ngIf="items$ | async as items">
      <div *ngIf="items.length === 0" class="empty-state">
        <mat-icon>shopping_cart</mat-icon>
        <p>Your cart is empty.</p>
        <button mat-raised-button color="primary" routerLink="/products">Browse Products</button>
      </div>

      <table mat-table [dataSource]="items" *ngIf="items.length > 0" class="mat-elevation-z1">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Book</th>
          <td mat-cell *matCellDef="let i">{{ i.name }}</td>
        </ng-container>

        <ng-container matColumnDef="unitPrice">
          <th mat-header-cell *matHeaderCellDef>Price</th>
          <td mat-cell *matCellDef="let i">₹{{ i.unitPrice }}</td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Qty</th>
          <td mat-cell *matCellDef="let i">
            <button mat-icon-button (click)="updateQuantity(i.productId, i.quantity - 1)" aria-label="Decrease quantity">
              <mat-icon>remove</mat-icon>
            </button>
            {{ i.quantity }}
            <button mat-icon-button (click)="updateQuantity(i.productId, i.quantity + 1)" aria-label="Increase quantity">
              <mat-icon>add</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="lineTotal">
          <th mat-header-cell *matHeaderCellDef>Line Total</th>
          <td mat-cell *matCellDef="let i">₹{{ lineTotal(i) }}</td>
        </ng-container>

        <ng-container matColumnDef="remove">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let i">
            <button mat-icon-button color="warn" (click)="remove(i.productId)" aria-label="Remove item">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['name', 'unitPrice', 'quantity', 'lineTotal', 'remove']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['name', 'unitPrice', 'quantity', 'lineTotal', 'remove'];"></tr>
      </table>

      <div class="cart-footer" *ngIf="items.length > 0">
        <div class="cart-total">
          <span>Total</span>
          <strong>₹{{ total$ | async }}</strong>
        </div>
        <button mat-raised-button color="primary" [disabled]="placing" (click)="placeOrder()">
          <mat-spinner *ngIf="placing" diameter="18" class="btn-spinner"></mat-spinner>
          <span>{{ placing ? 'Placing order…' : 'Place Order' }}</span>
        </button>
      </div>
    </ng-container>
  </mat-card>
</div>
